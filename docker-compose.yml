services:
  weblate:
    image: weblate/weblate:latest
    container_name: weblate
    ports:
      - "8080:8080"
    environment:
      WEBLATE_EMAIL_HOST: localhost
      WEBLATE_SERVER_EMAIL: noreply@localhost
      WEBLATE_DEFAULT_FROM_EMAIL: noreply@localhost
      WEBLATE_ALLOWED_HOSTS: localhost
      WEBLATE_ADMIN_EMAIL: admin@localhost
      WEBLATE_ADMIN_PASSWORD: admin
      WEBLATE_ADMIN_NAME: Admin
      WEBLATE_SITE_DOMAIN: localhost:8080
      WEBLATE_SITE_TITLE: Espace de Travail
      WEBLATE_REGISTRATION_OPEN: 0
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: weblate
      POSTGRES_USER: weblate
      POSTGRES_PASSWORD: weblate
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - weblate-data:/app/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: weblate
      POSTGRES_PASSWORD: weblate
      POSTGRES_DB: weblate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weblate"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  weblate-data:
  postgres-data:
  redis-data:
